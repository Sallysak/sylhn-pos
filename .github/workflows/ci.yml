# SYLHN POS — CI/CD pipeline
# Runs on every push and PR to main.
# - Lint
# - Type-check
# - Tests
# - Build (production)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Lint
        run: bun run lint
        continue-on-error: true  # warnings don't fail the build (yet)

      - name: Type-check
        run: bunx tsc --noEmit
        continue-on-error: true  # warnings don't fail the build (yet)

      - name: Tests
        run: bun run test

      - name: Build (production)
        run: bun run build
        env:
          DATABASE_URL: "file:./db/ci-test.db"
          SESSION_SECRET: "ci-test-secret-32-chars-minimum-length-ok"
          NODE_ENV: "production"

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: sylhn-pos-standalone
          path: .next/standalone
          retention-days: 7
